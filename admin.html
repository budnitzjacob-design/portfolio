<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CV Editor — Dashboard</title>
  <link href="css/style.css" rel="stylesheet">
  <style>
    :root {
      --bg:      #0d0d0d;
      --surface: #181818;
      --card:    #1e1e1e;
      --border:  #2e2e2e;
      --accent:  #ffd900;
      --green:   #44ff88;
      --danger:  #ff4444;
      --text:    #d8d8d8;
      --muted:   #555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrainsMono', monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: #000;
      border-bottom: 2px solid var(--accent);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 100;
    }
    .topbar-title {
      font-family: 'Bauhaus', serif;
      font-size: 17px;
      color: var(--accent);
      letter-spacing: 5px;
      flex: 1;
    }
    .topbar-title small {
      font-family: 'JetBrainsMono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-left: 12px;
    }

    /* ── Buttons ── */
    .btn {
      font-family: 'JetBrainsMono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
    .btn.primary:hover { opacity: .85; color: #000; }
    .btn.danger:hover { border-color: var(--danger); color: var(--danger); }

    #status {
      font-size: 11px;
      letter-spacing: 1px;
      min-width: 160px;
      text-align: right;
      color: var(--muted);
      transition: color .3s;
    }
    #status.ok  { color: var(--green); }
    #status.err { color: var(--danger); }

    /* ── Layout ── */
    #editor {
      max-width: 960px;
      margin: 0 auto;
      padding: 72px 20px 80px;
    }

    .add-section-btn-wrap {
      text-align: center;
      padding: 20px 0 8px;
    }

    /* ── Section card ── */
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      margin-bottom: 16px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #111;
      border-bottom: 1px solid var(--border);
    }

    .section-title-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      color: var(--accent);
      font-family: 'Bauhaus', serif;
      font-size: 15px;
      letter-spacing: 3px;
      padding: 3px 6px;
      outline: none;
      transition: border-color .15s;
    }
    .section-title-input:focus { border-bottom-color: var(--accent); }

    /* ── Reorder / icon buttons ── */
    .reorder-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }
    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      width: 22px;
      height: 18px;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: border-color .1s, color .1s;
      flex-shrink: 0;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.del:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Entry row ── */
    .entry-row {
      display: grid;
      grid-template-columns: 28px 110px 1fr 22px;
      gap: 8px;
      align-items: start;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }
    .entry-row:last-of-type { border-bottom: none; }

    /* Year column */
    .year-col { display: flex; flex-direction: column; gap: 4px; }

    .year-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrainsMono', monospace;
      font-size: 12px;
      padding: 4px 6px;
      resize: none;
      outline: none;
      min-height: 30px;
      line-height: 1.4;
    }
    .year-textarea:focus { border-color: var(--accent); }

    .year-link-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #777;
      font-family: 'JetBrainsMono', monospace;
      font-size: 10px;
      padding: 3px 6px;
      outline: none;
    }
    .year-link-input:focus { border-color: var(--accent); color: var(--text); }
    .year-link-input::placeholder { color: #333; }

    /* Entry content */
    .entry-wrap { position: relative; }

    .entry-content {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Times New Roman', serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 6px 8px;
      min-height: 38px;
      outline: none;
    }
    .entry-content:focus { border-color: var(--accent); }
    .entry-content.hidden { display: none; }

    /* Formatting mini-toolbar */
    .fmt-bar {
      display: none;
      position: absolute;
      top: -28px;
      left: 0;
      background: #000;
      border: 1px solid var(--border);
      gap: 0;
      z-index: 10;
    }
    .entry-content:focus ~ .fmt-bar,
    .fmt-bar:focus-within {
      display: flex;
    }
    .fmt-btn {
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 3px 8px;
      font-family: 'JetBrainsMono', monospace;
      line-height: 1;
    }
    .fmt-btn:last-child { border-right: none; }
    .fmt-btn:hover { color: var(--accent); background: #111; }
    .fmt-btn b { font-weight: 900; }
    .fmt-btn i { font-style: italic; }

    .source-btn {
      position: absolute;
      top: 3px;
      right: 4px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 10px;
      font-family: 'JetBrainsMono', monospace;
      padding: 1px 3px;
      z-index: 5;
    }
    .source-btn:hover { color: var(--accent); }

    .entry-source {
      display: none;
      width: 100%;
      background: #0a1a0a;
      border: 1px solid var(--accent);
      color: var(--green);
      font-family: 'JetBrainsMono', monospace;
      font-size: 12px;
      padding: 6px 8px;
      resize: vertical;
      min-height: 60px;
      outline: none;
    }
    .entry-source.active { display: block; }

    /* Add entry row */
    .add-entry-row {
      padding: 6px 14px;
      display: flex;
      justify-content: flex-end;
      border-top: 1px solid var(--border);
    }
    .add-entry-row button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'JetBrainsMono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 3px 10px;
      cursor: pointer;
      transition: all .15s;
    }
    .add-entry-row button:hover { border-color: var(--accent); color: var(--accent); }

    /* Empty state */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 80px 0;
    }

    /* ── Preview modal ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 200;
      flex-direction: column;
      padding: 32px;
    }
    #modal.open { display: flex; }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .modal-title {
      font-family: 'Bauhaus', serif;
      color: var(--accent);
      letter-spacing: 4px;
      flex: 1;
    }
    #modal-content {
      flex: 1;
      overflow: auto;
      background: #050505;
      border: 1px solid var(--accent);
      padding: 16px;
      font-family: 'JetBrainsMono', monospace;
      font-size: 12px;
      color: var(--green);
      white-space: pre;
      line-height: 1.5;
    }

    /* Drag-over highlight */
    .section-card.drag-over {
      border-left-color: #fff;
    }
    .entry-row.drag-over {
      background: #222;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div class="topbar-title">
    CV EDITOR
    <small>research.html</small>
  </div>
  <button class="btn" onclick="reload()">↺ RELOAD</button>
  <button class="btn" onclick="addSection()">+ SECTION</button>
  <button class="btn" onclick="showPreview()">PREVIEW</button>
  <button class="btn primary" onclick="push()" id="pushBtn">⬆ PUSH TO FILE</button>
  <span id="status"></span>
</div>

<!-- Editor -->
<div id="editor"><div class="empty">Loading…</div></div>

<!-- Preview modal -->
<div id="modal">
  <div class="modal-header">
    <span class="modal-title">GENERATED HTML</span>
    <button class="btn" onclick="copyHtml()">COPY</button>
    <button class="btn" onclick="document.getElementById('modal').classList.remove('open')">✕ CLOSE</button>
  </div>
  <div id="modal-content"></div>
</div>

<script>
// ═══════════════════════════════════════
// Data model
// ═══════════════════════════════════════
let state = []; // [{id, title, entries: [{id, yearText, yearHref, entryHtml}]}]

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

// ═══════════════════════════════════════
// Parse research.html → state
// ═══════════════════════════════════════
function parseHtml(text) {
  const doc = new DOMParser().parseFromString(text, 'text/html');
  const kids = Array.from(doc.body.children);
  const sections = [];
  let i = 0;
  while (i < kids.length) {
    const el = kids[i];
    if (el.classList.contains('research-section-title')) {
      const title = el.textContent.trim();
      const entries = [];
      i++;
      if (i < kids.length && kids[i].classList.contains('research-grid')) {
        const cells = Array.from(kids[i].children);
        for (let j = 0; j + 1 < cells.length; j += 2) {
          const yEl = cells[j];
          const link = yEl.querySelector('a');
          const yearText = link
            ? link.innerHTML.trim()
            : yEl.innerHTML.replace(/<br\s*\/?>/gi, '\n').trim();
          const yearHref = link ? (link.getAttribute('href') || '') : '';
          entries.push({
            id: uid(),
            yearText,
            yearHref,
            entryHtml: cells[j + 1].innerHTML.trim()
          });
        }
        i++;
      }
      sections.push({ id: uid(), title, entries });
    } else {
      i++;
    }
  }
  return sections;
}

// ═══════════════════════════════════════
// Build research.html from state
// ═══════════════════════════════════════
function buildHtml(sects) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  let h = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Curriculum Vitae \u2014 Jacob Budnitz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="css/style.css" rel="stylesheet">
  <link href="images/favicon.ico" rel="shortcut icon" type="image/x-icon">
</head>
<body class="research-body">
  <a href="index.html" class="back-nav dark">\u2190 HOME</a>

`;
  for (const s of sects) {
    h += `  <!-- ${s.title} -->\n`;
    h += `  <div class="research-section-title">${s.title}</div>\n`;
    h += `  <div class="research-grid">\n`;
    for (const e of s.entries) {
      const yr = e.yearHref
        ? `<a href="${esc(e.yearHref)}" target="_blank">${e.yearText}</a>`
        : e.yearText.replace(/\n/g, '<br>');
      h += `    <div class="research-year">${yr}</div>\n`;
      h += `    <div class="research-entry">${e.entryHtml}</div>\n\n`;
    }
    h += `  </div>\n\n`;
  }
  h += `</body>\n</html>`;
  return h;
}

// ═══════════════════════════════════════
// Read current DOM values → state array
// ═══════════════════════════════════════
function readState() {
  return Array.from(document.querySelectorAll('.section-card')).map(card => {
    const entries = Array.from(card.querySelectorAll('.entry-row')).map(row => {
      const src = row.querySelector('.entry-source');
      const rich = row.querySelector('.entry-content');
      return {
        id: row.dataset.id,
        yearText: row.querySelector('.year-textarea').value,
        yearHref: row.querySelector('.year-link-input').value.trim(),
        entryHtml: src.classList.contains('active') ? src.value : rich.innerHTML
      };
    });
    return { id: card.dataset.id, title: card.querySelector('.section-title-input').value.trim(), entries };
  });
}

// ═══════════════════════════════════════
// Render
// ═══════════════════════════════════════
function render() {
  const ed = document.getElementById('editor');
  if (!state.length) {
    ed.innerHTML = '<div class="empty">No sections yet — click <strong>+ SECTION</strong> to start.</div>';
    return;
  }
  ed.innerHTML = '';
  state.forEach(s => ed.appendChild(mkSection(s)));
}

function mkSection(s) {
  const card = document.createElement('div');
  card.className = 'section-card';
  card.dataset.id = s.id;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  hdr.innerHTML = `
    <div class="reorder-col">
      <button class="icon-btn" title="Move up" onclick="moveSection('${s.id}',-1)">▲</button>
      <button class="icon-btn" title="Move down" onclick="moveSection('${s.id}',1)">▼</button>
    </div>
    <input class="section-title-input" value="${xa(s.title)}" placeholder="SECTION TITLE">
    <button class="icon-btn del" title="Delete section" onclick="delSection('${s.id}')">✕</button>
  `;
  card.appendChild(hdr);

  // Entries
  s.entries.forEach(e => card.appendChild(mkEntry(e, s.id)));

  // Add entry
  const addRow = document.createElement('div');
  addRow.className = 'add-entry-row';
  addRow.innerHTML = `<button onclick="addEntry('${s.id}')">+ ADD ENTRY</button>`;
  card.appendChild(addRow);

  return card;
}

function mkEntry(e, sid) {
  const row = document.createElement('div');
  row.className = 'entry-row';
  row.dataset.id = e.id;

  // Col 1: reorder
  const rc = document.createElement('div');
  rc.className = 'reorder-col';
  rc.innerHTML = `
    <button class="icon-btn" title="Move up" onclick="moveEntry('${sid}','${e.id}',-1)">▲</button>
    <button class="icon-btn" title="Move down" onclick="moveEntry('${sid}','${e.id}',1)">▼</button>
  `;
  row.appendChild(rc);

  // Col 2: year
  const yc = document.createElement('div');
  yc.className = 'year-col';

  const yta = document.createElement('textarea');
  yta.className = 'year-textarea';
  yta.rows = 2;
  yta.placeholder = 'Year';
  yta.title = 'Year (newline for ranges like 2022–\nPresent)';
  yta.value = e.yearText;
  yc.appendChild(yta);

  const yli = document.createElement('input');
  yli.className = 'year-link-input';
  yli.type = 'url';
  yli.placeholder = 'link URL (optional)';
  yli.value = e.yearHref;
  yc.appendChild(yli);

  row.appendChild(yc);

  // Col 3: entry content
  const wrap = document.createElement('div');
  wrap.className = 'entry-wrap';

  const rich = document.createElement('div');
  rich.className = 'entry-content';
  rich.contentEditable = 'true';
  rich.innerHTML = e.entryHtml;
  wrap.appendChild(rich);

  // Formatting toolbar (shows on focus via CSS)
  const fmtBar = document.createElement('div');
  fmtBar.className = 'fmt-bar';
  fmtBar.innerHTML = `
    <button class="fmt-btn" onmousedown="event.preventDefault();fmt('bold')" title="Bold"><b>B</b></button>
    <button class="fmt-btn" onmousedown="event.preventDefault();fmt('italic')" title="Italic"><i>I</i></button>
    <button class="fmt-btn" onmousedown="event.preventDefault();fmtLink()" title="Link">🔗</button>
    <button class="fmt-btn" onmousedown="event.preventDefault();fmt('removeFormat')" title="Clear formatting">✕fmt</button>
  `;
  wrap.appendChild(fmtBar);

  const src = document.createElement('textarea');
  src.className = 'entry-source';
  src.value = e.entryHtml;
  wrap.appendChild(src);

  const srcBtn = document.createElement('button');
  srcBtn.className = 'source-btn';
  srcBtn.title = 'Toggle HTML source mode';
  srcBtn.textContent = '< >';
  srcBtn.onclick = () => toggleSrc(e.id, wrap);
  wrap.appendChild(srcBtn);

  row.appendChild(wrap);

  // Col 4: delete
  const del = document.createElement('button');
  del.className = 'icon-btn del';
  del.title = 'Delete entry';
  del.textContent = '✕';
  del.style.marginTop = '6px';
  del.onclick = () => delEntry(sid, e.id);
  row.appendChild(del);

  return row;
}

function xa(s) { // escape for attribute value
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════
// Operations
// ═══════════════════════════════════════
function addSection() {
  state = readState();
  const s = { id: uid(), title: 'NEW SECTION', entries: [] };
  state.push(s);
  render();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.section-title-input');
    const last = inputs[inputs.length - 1];
    last.focus(); last.select();
  }, 30);
}

function delSection(id) {
  if (!confirm('Delete this section and all its entries?')) return;
  state = readState();
  state = state.filter(s => s.id !== id);
  render();
}

function moveSection(id, dir) {
  state = readState();
  const i = state.findIndex(s => s.id === id);
  const j = i + dir;
  if (j < 0 || j >= state.length) return;
  [state[i], state[j]] = [state[j], state[i]];
  render();
}

function addEntry(sid) {
  state = readState();
  const s = state.find(s => s.id === sid);
  if (!s) return;
  const e = { id: uid(), yearText: '', yearHref: '', entryHtml: '' };
  s.entries.push(e);
  render();
  setTimeout(() => {
    const card = document.querySelector(`.section-card[data-id="${sid}"]`);
    if (card) {
      const rows = card.querySelectorAll('.entry-row');
      const last = rows[rows.length - 1];
      if (last) last.querySelector('.year-textarea').focus();
    }
  }, 30);
}

function delEntry(sid, eid) {
  state = readState();
  const s = state.find(s => s.id === sid);
  if (!s) return;
  s.entries = s.entries.filter(e => e.id !== eid);
  render();
}

function moveEntry(sid, eid, dir) {
  state = readState();
  const s = state.find(s => s.id === sid);
  if (!s) return;
  const i = s.entries.findIndex(e => e.id === eid);
  const j = i + dir;
  if (j < 0 || j >= s.entries.length) return;
  [s.entries[i], s.entries[j]] = [s.entries[j], s.entries[i]];
  render();
}

// ═══════════════════════════════════════
// Formatting
// ═══════════════════════════════════════
function fmt(cmd) {
  document.execCommand(cmd, false, null);
}

function fmtLink() {
  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) { alert('Select text first'); return; }
  const url = prompt('URL:');
  if (url) document.execCommand('createLink', false, url);
  // Force target=_blank via post-processing when saving
}

function toggleSrc(eid, wrap) {
  const rich = wrap.querySelector('.entry-content');
  const src = wrap.querySelector('.entry-source');
  const btn = wrap.querySelector('.source-btn');
  if (src.classList.contains('active')) {
    rich.innerHTML = src.value;
    src.classList.remove('active');
    rich.classList.remove('hidden');
    btn.textContent = '< >';
  } else {
    src.value = rich.innerHTML;
    src.classList.add('active');
    rich.classList.add('hidden');
    btn.textContent = '✓ done';
  }
}

// ═══════════════════════════════════════
// Push / Save
// ═══════════════════════════════════════
async function push() {
  state = readState();
  const html = buildHtml(state);
  setStatus('saving…', '');
  try {
    const r = await fetch('/api/save-research', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    setStatus('✓ SAVED', 'ok');
  } catch (err) {
    setStatus('✗ server not running — use PREVIEW to copy', 'err');
    showPreview();
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
  if (cls === 'ok') setTimeout(() => { el.textContent = ''; el.className = ''; }, 4000);
}

// ═══════════════════════════════════════
// Preview / Copy
// ═══════════════════════════════════════
function showPreview() {
  state = readState();
  document.getElementById('modal-content').textContent = buildHtml(state);
  document.getElementById('modal').classList.add('open');
}

async function copyHtml() {
  const text = document.getElementById('modal-content').textContent;
  try {
    await navigator.clipboard.writeText(text);
    const btn = event.currentTarget;
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = 'COPY', 1800);
  } catch { alert('Select all text in the box and copy manually.'); }
}

// ═══════════════════════════════════════
// Load
// ═══════════════════════════════════════
async function reload() {
  document.getElementById('editor').innerHTML = '<div class="empty">Loading…</div>';
  try {
    const r = await fetch('/research.html?t=' + Date.now());
    if (!r.ok) throw new Error('Could not fetch');
    state = parseHtml(await r.text());
    render();
    setStatus('loaded', 'ok');
  } catch {
    state = [];
    render();
    setStatus('✗ server not running', 'err');
  }
}

// Cmd/Ctrl+S to push
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); push(); }
});

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal').classList.remove('open');
});

reload();
</script>
</body>
</html>
